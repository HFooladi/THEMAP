name: Python Linting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Least privilege: linting only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        # No uv.lock in this repo; key the cache off pyproject.toml instead of
        # the default **/uv.lock glob (which errors when nothing matches).
        cache-dependency-glob: "pyproject.toml"

    - name: Install dependencies
      run: |
        uv pip install --system ruff==0.12.4 mypy==1.17.0

    - name: Lint with ruff
      run: |
        ruff check .

    - name: Check formatting with ruff
      run: |
        ruff format --check .

    - name: Type check with mypy
      run: |
        mypy -p themap
